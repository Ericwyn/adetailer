<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADetailer Region Predict</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #080808;
      --muted: #666;
      --line: #d8d8d8;
      --paper: #fff;
      --soft: #f4f4f4;
      --inverse: #fff;
      --radius: 8px;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        var(--paper);
      background-size: 48px 48px;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 48px;
    }

    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 24px;
      padding-bottom: 28px;
      border-bottom: 2px solid var(--ink);
    }

    .kicker {
      margin-bottom: 10px;
      font-family: "Courier New", monospace;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      font-size: clamp(38px, 7vw, 92px);
      line-height: 0.92;
      font-weight: 700;
      letter-spacing: 0;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 8px;
      font-family: "Courier New", monospace;
      font-size: 12px;
      text-transform: uppercase;
    }

    .meta span {
      border: 1px solid var(--ink);
      padding: 6px 9px;
      background: var(--paper);
    }

    .workspace {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 24px;
      padding-top: 24px;
      align-items: start;
    }

    .panel {
      background: var(--paper);
      border: 2px solid var(--ink);
      box-shadow: var(--shadow);
    }

    .control-panel {
      position: sticky;
      top: 20px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 14px;
      border-bottom: 2px solid var(--ink);
      font-family: "Courier New", monospace;
      font-size: 12px;
      text-transform: uppercase;
    }

    .panel-index {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 1px solid var(--ink);
      border-radius: 50%;
      font-weight: 700;
    }

    .form-body {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .url-input {
      width: 100%;
      min-height: 124px;
      resize: vertical;
      padding: 14px;
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      background: var(--soft);
      color: var(--ink);
      font-family: "Courier New", monospace;
      font-size: 14px;
      line-height: 1.5;
      outline: none;
    }

    .url-input:focus {
      background: var(--paper);
      box-shadow: 0 0 0 3px var(--ink);
    }

    .actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
    }

    .primary {
      min-height: 46px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: var(--ink);
      color: var(--inverse);
      cursor: pointer;
      font-family: "Courier New", monospace;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .primary:hover {
      transform: translateY(-1px);
      background: var(--paper);
      color: var(--ink);
    }

    .primary:disabled {
      transform: none;
      background: #bdbdbd;
      border-color: #bdbdbd;
      color: #f6f6f6;
      cursor: wait;
    }

    .clear {
      width: 46px;
      min-height: 46px;
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      font-family: "Courier New", monospace;
      font-size: 20px;
      line-height: 1;
    }

    .clear:hover {
      background: var(--soft);
    }

    .status {
      min-height: 42px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .status.ok,
    .status.error {
      border-color: var(--ink);
      color: var(--ink);
      background: var(--soft);
    }

    .result-stack {
      display: grid;
      gap: 18px;
      min-width: 0;
    }

    .stage {
      min-height: 420px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(135deg, transparent 0 48%, rgba(0, 0, 0, 0.05) 48% 52%, transparent 52%),
        var(--soft);
    }

    .empty-state {
      width: min(420px, calc(100% - 36px));
      padding: 26px;
      border: 1px dashed var(--ink);
      background: rgba(255, 255, 255, 0.78);
      text-align: center;
      font-family: "Courier New", monospace;
      font-size: 12px;
      line-height: 1.55;
      text-transform: uppercase;
    }

    .canvas-wrap {
      width: 100%;
      display: none;
      background: var(--paper);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .tags {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
    }

    .tag {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid var(--ink);
      background: var(--paper);
      font-family: "Courier New", monospace;
      font-size: 12px;
      line-height: 1.25;
    }

    .tag strong {
      overflow-wrap: anywhere;
    }

    .tag span {
      color: var(--muted);
      white-space: nowrap;
    }

    .json-wrap {
      display: none;
    }

    pre {
      max-height: 360px;
      overflow: auto;
      padding: 16px;
      background: #111;
      color: #f5f5f5;
      font-family: "Courier New", monospace;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 900px) {
      .page {
        width: min(100% - 24px, 720px);
        padding-top: 24px;
      }

      .masthead,
      .workspace {
        grid-template-columns: 1fr;
      }

      .control-panel {
        position: static;
      }

      .stage {
        min-height: 320px;
      }
    }

    @media (max-width: 520px) {
      body {
        background-size: 30px 30px;
      }

      .page {
        width: 100%;
        padding: 16px 12px 28px;
      }

      .masthead {
        gap: 18px;
      }

      h1 {
        font-size: clamp(34px, 16vw, 58px);
      }

      .meta {
        grid-template-columns: 1fr;
      }

      .workspace {
        gap: 16px;
        padding-top: 16px;
      }

      .form-body {
        padding: 12px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .clear {
        width: 100%;
      }

      .stage {
        min-height: 260px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div>
        <div class="kicker">YOLOv8 / REGION PREDICT</div>
        <h1>ADetailer Inspector</h1>
      </div>
      <div class="meta" aria-label="service metadata">
        <span>POST /regionPredict</span>
        <span>Black / White</span>
      </div>
    </header>

    <section class="workspace">
      <aside class="panel control-panel">
        <div class="panel-head">
          <span>Input</span>
          <span class="panel-index">01</span>
        </div>
        <div class="form-body">
          <textarea class="url-input" id="url-input" spellcheck="false" placeholder="https://example.com/image.jpg"></textarea>
          <div class="actions">
            <button class="primary" id="btn" onclick="predict()">Detect</button>
            <button class="clear" type="button" onclick="clearAll()" aria-label="Clear input and results">x</button>
          </div>
          <div id="status" class="status">Idle</div>
        </div>
      </aside>

      <div class="result-stack">
        <section class="panel">
          <div class="panel-head">
            <span>Preview</span>
            <span class="panel-index">02</span>
          </div>
          <div class="stage">
            <div class="empty-state" id="empty-state">Paste an image URL and run detection.</div>
            <div class="canvas-wrap" id="canvas-wrap">
              <canvas id="canvas"></canvas>
            </div>
          </div>
        </section>

        <section class="tags" id="tags" aria-label="detected regions"></section>

        <section class="panel json-wrap" id="json-wrap">
          <div class="panel-head">
            <span>Raw Response</span>
            <span class="panel-index">03</span>
          </div>
          <pre id="json-out"></pre>
        </section>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("url-input").addEventListener("keydown", event => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        predict();
      }
    });

    async function predict() {
      const url = document.getElementById("url-input").value.trim();
      if (!url) return;

      const btn = document.getElementById("btn");
      const status = document.getElementById("status");
      btn.disabled = true;
      btn.textContent = "Detecting";
      status.className = "status";
      status.textContent = "Requesting inference...";
      hideResults();

      let data;
      try {
        const res = await fetch("/regionPredict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image_url: url }),
        });
        data = await res.json();
      } catch (error) {
        status.className = "status error";
        status.textContent = "Request failed: " + error.message;
        resetButton(btn);
        return;
      }

      if (data.error) {
        status.className = "status error";
        status.textContent = data.error;
        showJson(data);
        resetButton(btn);
        return;
      }

      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        drawResult(img, data);
        resetButton(btn);
      };
      img.onerror = () => {
        status.className = "status error";
        status.textContent = "Image preview failed. The API response is shown below.";
        showJson(data);
        resetButton(btn);
      };
      img.src = url;
    }

    function drawResult(img, data) {
      const canvas = document.getElementById("canvas");
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      const regions = data.regions || [];
      const fontSize = Math.max(13, Math.round(img.naturalWidth * 0.014));
      const lineWidth = Math.max(2, Math.round(img.naturalWidth * 0.003));

      regions.forEach((region, index) => {
        const [x1, y1, x2, y2] = region.bbox;
        const width = x2 - x1;
        const height = y2 - y1;
        const label = `${index + 1}. ${region.label} ${(region.confidence * 100).toFixed(0)}%`;

        ctx.strokeStyle = "#000";
        ctx.lineWidth = lineWidth;
        ctx.strokeRect(x1, y1, width, height);

        ctx.font = `700 ${fontSize}px Courier New, monospace`;
        const textWidth = ctx.measureText(label).width + 14;
        const tagHeight = fontSize + 10;
        const tagY = y1 >= tagHeight ? y1 - tagHeight : y1;

        ctx.fillStyle = "#000";
        ctx.fillRect(x1, tagY, Math.min(textWidth, img.naturalWidth - x1), tagHeight);
        ctx.fillStyle = "#fff";
        ctx.fillText(label, x1 + 7, tagY + fontSize + 1);
      });

      document.getElementById("empty-state").style.display = "none";
      document.getElementById("canvas-wrap").style.display = "block";

      const status = document.getElementById("status");
      status.className = "status ok";
      status.textContent = `Done. ${regions.length} regions. ${data.image_size.width} x ${data.image_size.height}px.`;

      renderTags(regions);
      showJson(data);
    }

    function renderTags(regions) {
      const tags = document.getElementById("tags");
      tags.innerHTML = "";
      if (!regions.length) {
        tags.style.display = "none";
        return;
      }

      regions.forEach((region, index) => {
        const tag = document.createElement("div");
        tag.className = "tag";
        tag.innerHTML = `<strong>${index + 1}. ${region.label}</strong><span>${(region.confidence * 100).toFixed(1)}%</span>`;
        tags.appendChild(tag);
      });
      tags.style.display = "grid";
    }

    function showJson(data) {
      document.getElementById("json-wrap").style.display = "block";
      document.getElementById("json-out").textContent = JSON.stringify(data, null, 2);
    }

    function hideResults() {
      document.getElementById("empty-state").style.display = "block";
      document.getElementById("canvas-wrap").style.display = "none";
      document.getElementById("json-wrap").style.display = "none";
      document.getElementById("tags").style.display = "none";
      document.getElementById("tags").innerHTML = "";
    }

    function clearAll() {
      document.getElementById("url-input").value = "";
      document.getElementById("status").className = "status";
      document.getElementById("status").textContent = "Idle";
      hideResults();
    }

    function resetButton(btn) {
      btn.disabled = false;
      btn.textContent = "Detect";
    }
  </script>
</body>
</html>
